aid: university-of-michigan-ann-arbor
name: University of Michigan-Ann Arbor
description: >-
  The University of Michigan-Ann Arbor is a public research university ranked
  #21 in the QS World University Rankings 2025 (United States). Its developer
  and API footprint is led by U-M Information and Technology Services (ITS),
  which operates an enterprise API Directory built on Apigee X that exposes
  institutional data APIs to authenticated U-M members behind uniqname, Duo
  two-factor, and campus-network/VPN access. The University of Michigan Library
  publishes public scholarly and research-data infrastructure, including the
  Deep Blue Data REST API and a live DSpace OAI-PMH metadata endpoint for the
  Deep Blue Documents institutional repository, and runs Ex Libris Alma/Primo
  for library services. Open-source code is published across several GitHub
  organizations including @umich and @mlibrary.
