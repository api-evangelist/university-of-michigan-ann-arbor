apis:
  - aid: university-of-michigan-ann-arbor:api-directory
    name: U-M ITS API Directory
    description: >-
      Enterprise API directory and gateway operated by U-M Information and
      Technology Services on Apigee X, providing access to institutional data
      APIs spanning teaching & learning, research, clinical care, public
      service, and administration. Access is gated: developers sign in with a
      U-M uniqname and password, complete Duo two-factor authentication, and
      must be on the U-M network or VPN to browse, subscribe to, and consume
      APIs. Documentation includes named services such as the MCommunity
      directory APIs.
    humanURL: https://its.umich.edu/data/data-database/api-directory
    tags: [ API Directory, Apigee, Identity, Institutional Data, Gated ]
    properties:
      - type: Documentation
        url: https://its.umich.edu/data/data-database/api-directory
      - type: Documentation
        url: https://documentation.its.umich.edu/api-directory
      - type: GettingStarted
        url: https://its.umich.edu/data/data-database/api-directory/getting-started
  - aid: university-of-michigan-ann-arbor:deep-blue-data
    name: Deep Blue Data REST API
    description: >-
      Public REST API for Deep Blue Data, the University of Michigan Library's
      open repository for sharing and archiving research datasets generated by
      U-M researchers. Provides programmatic access to dataset records and
      metadata with DOI persistent identifiers; data is free to access and
      download by the public.
    humanURL: https://deepblue.lib.umich.edu/data/rest-api
    baseURL: https://deepblue.lib.umich.edu/data
    tags: [ Research Data, Repository, REST, Open Data, Library ]
    properties:
      - type: Documentation
        url: https://deepblue.lib.umich.edu/data/rest-api
  - aid: university-of-michigan-ann-arbor:deep-blue-documents-oai
    name: Deep Blue Documents OAI-PMH
    description: >-
      Live OAI-PMH metadata harvesting endpoint for Deep Blue Documents, the
      University of Michigan Library's DSpace institutional repository of
      articles, dissertations, theses, and other scholarly works. Supports
      standard OAI-PMH verbs (Identify, ListRecords, ListSets) and metadata
      formats including oai_dc for open harvesting by aggregators and discovery
      services.
    humanURL: https://www.lib.umich.edu/collections/deep-blue-repositories
    baseURL: https://backend.production.deepblue-documents.lib.umich.edu/server/oai/request
    tags: [ OAI-PMH, DSpace, Institutional Repository, Metadata, Library ]
    properties:
      - type: Documentation
        url: https://www.lib.umich.edu/collections/deep-blue-repositories
