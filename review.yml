reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      U-M has a substantial but mostly gated API program. The ITS API Directory
      runs on Apigee X and requires a U-M uniqname, Duo two-factor, and
      campus-network/VPN access, so its endpoints could not be probed
      anonymously. The strongest verifiable public surface is library
      infrastructure: the Deep Blue Documents DSpace OAI-PMH endpoint resolved
      live (HTTP 200) with a valid Identify response, and Deep Blue Data
      documents a public REST API. GitHub orgs @umich and @mlibrary were
      confirmed via the GitHub API. Several umich.edu pages return 403 to
      automated agents (Akamai bot protection) but are real, publicly
      documented pages. No endpoints were fabricated; ratings reflect that most
      enterprise APIs are member-only.
